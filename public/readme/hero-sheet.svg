<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1460" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1014"/>
      <stop offset="1" stop-color="#222632"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1150 170) rotate(120) scale(520 720)">
      <stop stop-color="#FFF4D8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFF4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="312" y1="144" x2="1288" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F8F3E7"/>
    </linearGradient>
    <linearGradient id="shadow" x1="310" y1="170" x2="1250" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="960" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="960" rx="36" fill="url(#glow)"/>

  <circle cx="170" cy="128" r="3" fill="#3A404C"/>
  <circle cx="230" cy="128" r="3" fill="#3A404C"/>
  <circle cx="290" cy="128" r="3" fill="#3A404C"/>
  <circle cx="1350" cy="812" r="3" fill="#3A404C"/>
